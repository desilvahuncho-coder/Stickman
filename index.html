<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waffles Dance Trend - Exact Match</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #faba26; /* Exact matched golden-yellow from screenshot */
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <canvas id="stage"></canvas>

    <script>
        const canvas = document.getElementById('stage');
        const ctx = canvas.getContext('2d');

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resize);
        resize();

        let lastTime = 0;
        let time = 0;

        function animate(timestamp) {
            if (!lastTime) lastTime = timestamp;
            let dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            time += dt;

            // Background
            ctx.fillStyle = '#faba26';
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            const cx = window.innerWidth / 2;
            const cy = window.innerHeight * 0.42; 
            const baseScale = Math.min(window.innerWidth / 375, window.innerHeight / 812) * 1.1;

            // Trend dance animation tracking (smooth hip sway + bouncing bounce)
            const danceSway = Math.sin(time * 3.2) * 8;
            const danceBounce = Math.abs(Math.sin(time * 3.2)) * 6;

            ctx.save();
            ctx.translate(cx + danceSway, cy + danceBounce);
            ctx.scale(baseScale, baseScale);

            // COLOR PALETTE MATCHING
            const skinColor = '#cf987c';
            const topColor = '#59423f';
            const pantsColor = '#c2c2c9';
            const hairColor = '#141416';
            const shoeColor = '#fdfdfd';

            // 1. FLOATING GROUND REFLECTION (As seen in the TikTok video layout)
            ctx.save();
            ctx.translate(0, 260);
            ctx.scale(1, -0.25); // Flatten and invert for soft reflection matrix
            ctx.globalAlpha = 0.15;
            // Draw duplicate pants/shoes reflection shadow
            ctx.fillStyle = pantsColor;
            ctx.beginPath();
            ctx.arc(-26, 0, 16, 0, Math.PI * 2);
            ctx.arc(26, 0, 16, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // 2. EXTRA-BAGGY TEARDROP SWEATPANTS
            ctx.fillStyle = pantsColor;
            ctx.beginPath();
            ctx.moveTo(-14, 40); // Slim high waist center
            
            // Left leg massive pooling bell flare
            ctx.bezierCurveTo(-22, 42, -68, 110, -68, 195);
            ctx.bezierCurveTo(-68, 235, -46, 252, -26, 252); // Soft pooling ankle structure
            ctx.bezierCurveTo(-20, 215, -8, 130, -3, 105);   // Crotch inner line
            
            // Right leg massive pooling bell flare
            ctx.lineTo(3, 105);
            ctx.bezierCurveTo(8, 130, 20, 215, 26, 252);
            ctx.bezierCurveTo(46, 252, 68, 235, 68, 195);
            ctx.bezierCurveTo(68, 110, 22, 42, 14, 40);
            ctx.closePath();
            ctx.fill();

            // Minimalist tiny drawstring fold indicators
            ctx.strokeStyle = '#9ea1a8';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(-2, 54); ctx.lineTo(-2, 63);
            ctx.moveTo(2, 54); ctx.lineTo(2, 63);
            ctx.stroke();

            // Clean Rounded White Kicks / Shoes
            ctx.fillStyle = shoeColor;
            ctx.beginPath();
            ctx.arc(-26, 251, 14, 0, Math.PI, false);
            ctx.arc(26, 251, 14, 0, Math.PI, false);
            ctx.fill();

            // 3. SLENDER TAPERED WAIST & TOP
            ctx.fillStyle = topColor;
            ctx.beginPath();
            ctx.moveTo(-26, -55); // Left shoulder
            ctx.bezierCurveTo(-12, -54, 12, -54, 26, -55); // Right shoulder
            ctx.bezierCurveTo(24, -15, 20, 15, 14, 42);   // Fitted ribs
            ctx.lineTo(-14, 42);
            ctx.bezierCurveTo(-20, 15, -24, -15, -26, -55);
            ctx.closePath();
            ctx.fill();

            // 4. SLENDER SKIN-TONED NECK
            ctx.fillStyle = skinColor;
            ctx.fillRect(-8, -80, 16, 28);

            // 5. ICONIC CROSSED ARMS POSE (Exactly matching the frame setup)
            ctx.fillStyle = topColor;
            
            // Left Arm Layer (Curves across behind the right wrist forearm)
            ctx.save();
            ctx.translate(-24, -53);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-14, 30, -2, 62, 24, 60);
            ctx.bezierCurveTo(24, 46, 12, 42, -2, 34);
            ctx.bezierCurveTo(-6, 24, -4, 10, 0, 0);
            ctx.closePath();
            ctx.fill();
            ctx.restore();

            // Right Arm Layer (Crosses completely over the top front center)
            ctx.save();
            ctx.translate(24, -53);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(14, 28, 4, 66, -26, 64);
            ctx.bezierCurveTo(-38, 62, -32, 36, -14, 34);
            ctx.bezierCurveTo(-4, 28, 2, 12, 0, 0);
            ctx.closePath();
            ctx.fill();
            ctx.restore();

            // Exposed skin hands tucked cleanly in loops
            ctx.fillStyle = skinColor;
            ctx.beginPath();
            ctx.arc(-10, 10, 7.5, 0, Math.PI * 2);  // Left forearm knuckle curve
            ctx.arc(-2, -5, 8.5, 0, Math.PI * 2);   // Right chin-resting hand curve
            ctx.fill();

            // 6. PERFECT OVAL FACELESS HEAD
            ctx.fillStyle = skinColor;
            ctx.beginPath();
            ctx.ellipse(0, -114, 36, 38, 0, 0, Math.PI * 2);
            ctx.fill();

            // 7. HIGH-FIDELITY CORNROW HAIR PATTERNS
            ctx.fillStyle = hairColor;
            
            // Hair Cap Back Base
            ctx.beginPath();
            ctx.ellipse(0, -120, 36.5, 33, 0, Math.PI, 0, false);
            ctx.fill();

            // Real detailed scalloped baby-hair waves framing the upper forehead rim
            ctx.beginPath();
            for (let angle = Math.PI; angle <= Math.PI * 2; angle += 0.12) {
                let hx = Math.cos(angle) * 36;
                let hy = -120 + Math.sin(angle) * 31;
                ctx.arc(hx, hy, 4, 0, Math.PI * 2);
            }
            ctx.fill();

            // Tightly bundled vertical cornrow paths arching front-to-back over crown
            const tracks = 9;
            ctx.lineWidth = 2.2;
            ctx.strokeStyle = '#222226'; // Subtle tracking line highlights
            for (let i = 0; i < tracks; i++) {
                ctx.beginPath();
                let spacingIdx = (i / (tracks - 1)) - 0.5;
                ctx.ellipse(spacingIdx * 18, -125, 28, 28, 0, Math.PI * 1.1, Math.PI * 1.9);
                ctx.stroke();
            }

            // Dual micro braids drops looping down past the ears/shoulders in back profile
            ctx.fillStyle = hairColor;
            ctx.fillRect(-36, -105, 4.5, 34);
            ctx.fillRect(31.5, -105, 4.5, 34);

            ctx.restore();

            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
    </script>
</body>
</html>
