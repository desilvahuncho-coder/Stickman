<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Build: Stylized Vector Rig with Ribbon</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f7b731; /* Reference yellow backplate */
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #info {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
            font-size: 12px;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px;
            border-radius: 8px;
            line-height: 1.6;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="info">
        <div>CHARACTER: <span style="color: #ff75a0; font-weight: bold;">STYLIZED VECTOR REBUILD</span></div>
        <div>HAIR: <span style="color: #4b7bec;">CORNROWS / BRAIDS</span></div>
        <div>ACCESSORY: <span style="color: #ff4757; font-weight: bold;">PINK FOREHEAD BOW 🎀</span></div>
        <div>ACTION: <span style="color: #2ed573;">WAVING HAND</span></div>
    </div>
    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, character;
        let clock = new THREE.Clock();

        // --- FIXED TIMING GLOBALS ---
        const FPS = 30;
        const TOTAL_FRAMES = 1350; 

        init();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            // Match the scene background to the page body yellow
            scene.background = new THREE.Color(0xf7b731); 

            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
            // Lowered and brought the camera closer for perfect center-frame viewport matching
            camera.position.set(0, 1.2, 2.3); 

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // --- BUILD CHARACTER WITH FLAT VECTOR SHADERS ---
            character = createPremiumFemaleCharacter({
                topColor: 0x5a3d31,     // Earthy brown top
                pantsColor: 0xb0b0b8,   // Grey sweatpants
                skinColor: 0x9c6e53,    // Warm skin tone
                hairColor: 0x111113,    // Dark hair tracking
                ribbonColor: 0xff4757,  // Ribbon Pink
                pos: new THREE.Vector3(0, -0.3, 0) // Shifted down slightly to fit the view boundaries perfectly
            });

            window.addEventListener('resize', onWindowResize, false);
        }

        function createPremiumFemaleCharacter(config) {
            const group = new THREE.Group();
            group.position.copy(config.pos);

            // Switched to MeshBasicMaterial for a clean vector illustration finish
            const skinMat = new THREE.MeshBasicMaterial({ color: config.skinColor });
            const topMat = new THREE.MeshBasicMaterial({ color: config.topColor });
            const pantsMat = new THREE.MeshBasicMaterial({ color: config.pantsColor });
            const hairMat = new THREE.MeshBasicMaterial({ color: config.hairColor });
            const ribbonMat = new THREE.MeshBasicMaterial({ color: config.ribbonColor });
            const shoeMat = new THREE.MeshBasicMaterial({ color: 0xeeeeee });

            // 1. Faceless Head
            const headGroup = new THREE.Group();
            const headGeo = new THREE.SphereGeometry(0.2, 32, 32);
            const headBase = new THREE.Mesh(headGeo, skinMat);
            headBase.position.y = 1.8;
            headGroup.add(headBase);

            // 2. Braided Hair Cap
            const braidLines = 8;
            for (let i = 0; i < braidLines; i++) {
                const braid = new THREE.Mesh(new THREE.TorusGeometry(0.202, 0.015, 6, 24, Math.PI), hairMat);
                braid.position.y = 1.81;
                braid.rotation.y = (i - (braidLines / 2)) * 0.16 + 0.08;
                braid.rotation.x = -Math.PI / 5;
                headGroup.add(braid);
            }

            // Braids hanging low on the sides
            for (let side of [-1, 1]) {
                const braidStrand = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.01, 0.25, 6), hairMat);
                braidStrand.position.set(0.15 * side, 1.66, -0.02);
                braidStrand.rotation.z = -0.15 * side;
                headGroup.add(braidStrand);
            }

            // 3. Side Forehead Ribbon Bow (🎀)
            const ribbonGroup = new THREE.Group();
            ribbonGroup.position.set(-0.11, 1.93, 0.12); // Mounted directly over her left forehead curve
            ribbonGroup.rotation.set(0.2, -0.4, 0.3);

            // Center core tie knot
            const centerNode = new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 8), ribbonMat);
            ribbonGroup.add(centerNode);

            // Bow Loops
            const loopGeo = new THREE.TorusGeometry(0.035, 0.012, 6, 16);
            const leftLoop = new THREE.Mesh(loopGeo, ribbonMat);
            leftLoop.position.x = -0.035;
            leftLoop.rotation.y = Math.PI / 6;
            ribbonGroup.add(leftLoop);

            const rightLoop = new THREE.Mesh(loopGeo, ribbonMat);
            rightLoop.position.x = 0.035;
            rightLoop.rotation.y = -Math.PI / 6;
            ribbonGroup.add(rightLoop);

            // Bow Streamer Tails
            const tailGeo = new THREE.CylinderGeometry(0.008, 0.014, 0.09, 4);
            const leftTail = new THREE.Mesh(tailGeo, ribbonMat);
            leftTail.position.set(-0.02, -0.045, 0.01);
            leftTail.rotation.z = 0.4;
            ribbonGroup.add(leftTail);

            const rightTail = new THREE.Mesh(tailGeo, ribbonMat);
            rightTail.position.set(0.02, -0.045, 0.01);
            rightTail.rotation.z = -0.4;
            ribbonGroup.add(rightTail);

            headGroup.add(ribbonGroup);
            group.add(headGroup);

            // 4. Neck & Torso
            const torsoGeo = new THREE.CylinderGeometry(0.13, 0.10, 0.55, 16);
            const torso = new THREE.Mesh(torsoGeo, topMat);
            torso.position.y = 1.35;
            group.add(torso);

            const neckGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.12, 12);
            const neck = new THREE.Mesh(neckGeo, skinMat);
            neck.position.y = 1.64;
            group.add(neck);

            // 5. Long Sleeve Arms
            const leftArmRoot = new THREE.Group();
            leftArmRoot.position.set(-0.15, 1.55, 0);
            const leftArmMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.048, 0.04, 0.4, 12), topMat);
            leftArmMesh.position.y = -0.2;
            leftArmRoot.add(leftArmMesh);

            const leftHand = new THREE.Mesh(new THREE.SphereGeometry(0.038, 12, 12), skinMat);
            leftHand.position.y = -0.42;
            leftArmRoot.add(leftHand);
            group.add(leftArmRoot);

            const rightArmRoot = new THREE.Group();
            rightArmRoot.position.set(0.15, 1.55, 0);
            const rightArmMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.048, 0.04, 0.4, 12), topMat);
            rightArmMesh.position.y = -0.2;
            rightArmRoot.add(rightArmMesh);

            const rightHand = new THREE.Mesh(new THREE.SphereGeometry(0.038, 12, 12), skinMat);
            rightHand.position.y = -0.42;
            rightArmRoot.add(rightHand);
            group.add(rightArmRoot);

            // 6. Extra Baggy Sweatpants & Shoes
            function buildPuffyLeg() {
                const legGroup = new THREE.Group();
                const thigh = new THREE.Mesh(new THREE.SphereGeometry(0.15, 18, 18), pantsMat);
                thigh.scale.set(1.1, 1.4, 1.15); 
                thigh.position.y = -0.25;
                legGroup.add(thigh);

                const shin = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.07, 0.45, 16), pantsMat);
                shin.position.y = -0.65;
                legGroup.add(shin);

                const kick = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.09, 0.23), shoeMat);
                kick.position.set(0, -0.9, 0.04);
                legGroup.add(kick);

                return legGroup;
            }
            const leftLeg = buildPuffyLeg(); leftLeg.position.set(-0.13, 1.05, 0);
            const rightLeg = buildPuffyLeg(); rightLeg.position.set(0.13, 1.05, 0);
            group.add(leftLeg, rightLeg);

            scene.add(group);

            return {
                root: group, head: headGroup, leftArm: leftArmRoot, rightArm: rightArmRoot, leftLeg, rightLeg
            };
        }

        // --- ANIMATION TRACK ---
        function animate() {
            requestAnimationFrame(animate);
            
            const time = clock.getElapsedTime();

            // Rhythmic breathing sways
            character.root.position.y = -0.3 + Math.sin(time * 2.2) * 0.015;
            character.head.rotation.z = Math.sin(time * 1.1) * 0.03;

            // Fluid Hand Waving Track Logic
            character.rightArm.rotation.z = -Math.PI * 0.72; // Raise arm
            character.rightArm.rotation.x = -Math.PI * 0.15; // Swing forward slightly
            
            const waveTrack = Math.sin(time * 8.0) * 0.3; // Harmonic wave sweep velocity
            character.rightArm.rotation.y = waveTrack; 

            // Left arm loose at her side
            character.leftArm.rotation.z = -Math.PI * 0.06 + Math.sin(time * 1.5) * 0.02;

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
