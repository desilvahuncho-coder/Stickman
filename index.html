<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Build: Stylized Vector Rig with Ribbon</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f7b731; /* Vibrant background matching your reference vibe */
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #info {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #ffffff;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.75);
            padding: 12px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="info">
        <div>CHARACTER: <span style="color: #ff75a0; font-weight: bold;">STYLIZED FEMALE RAMP REBUILD</span></div>
        <div>HAIR: <span style="color: #4b7bec;">CORNROWS / BRAIDS</span></div>
        <div>ACCESSORY: <span style="color: #ff4757; font-weight: bold;">PINK SIDE-RIBBON BOW 🎀</span></div>
        <div>ACTION: <span style="color: #2ed573;">HAND WAVE CYCLE</span></div>
    </div>
    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, character;
        let clock = new THREE.Clock();

        init();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf7b731); // Warm yellow-orange matching the reference image backplate

            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.3, 3.2); // Positioned for a perfect framing preview

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // Lighting system setup to give deep vector style gradient values
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.75);
            scene.add(ambientLight);

            const studioLight = new THREE.DirectionalLight(0xffffff, 0.4);
            studioLight.position.set(2, 4, 3);
            scene.add(studioLight);

            // --- BUILD INDIVIDUAL STYLIZED FEMALE CHARACTER ---
            character = createPremiumFemaleCharacter({
                topColor: 0x5a3d31,     // Earthy brown long-sleeve crop top
                pantsColor: 0xb0b0b8,   // Slouchy oversized grey sweatpants
                skinColor: 0x9c6e53,    // Warm skin tone matching the video reference
                hairColor: 0x111113,    // Dark braided hair tracking structure
                ribbonColor: 0xff4757,  // Bold pop-pink signature ribbon 🎀
                pos: new THREE.Vector3(0, 0, 0)
            });

            window.addEventListener('resize', onWindowResize, false);
        }

        function createPremiumFemaleCharacter(config) {
            const group = new THREE.Group();
            group.position.copy(config.pos);

            // Material Palettes matching vector graphics shading styles
            const skinMat = new THREE.MeshStandardMaterial({ color: config.skinColor, roughness: 0.6 });
            const topMat = new THREE.MeshStandardMaterial({ color: config.topColor, roughness: 0.7 });
            const pantsMat = new THREE.MeshStandardMaterial({ color: config.pantsColor, roughness: 0.8 });
            const hairMat = new THREE.MeshBasicMaterial({ color: config.hairColor });
            const ribbonMat = new THREE.MeshStandardMaterial({ color: config.ribbonColor, roughness: 0.5 });
            const shoeMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.5 });

            // 1. Faceless Silhouette Head Structure
            const headGroup = new THREE.Group();
            const headGeo = new THREE.SphereGeometry(0.2, 32, 32);
            const headBase = new THREE.Mesh(headGeo, skinMat);
            headBase.position.y = 1.8;
            headGroup.add(headBase);

            // 2. Procedural Hair Braid Arcs (Cornrows)
            const braidLines = 8;
            for (let i = 0; i < braidLines; i++) {
                const braid = new THREE.Mesh(new THREE.TorusGeometry(0.204, 0.016, 6, 24, Math.PI), hairMat);
                braid.position.y = 1.82;
                braid.rotation.y = (i - (braidLines / 2)) * 0.16 + 0.08;
                braid.rotation.x = -Math.PI / 5;
                headGroup.add(braid);
            }

            // Hanging extension braids frames wrapping behind
            for (let side of [-1, 1]) {
                const braidStrand = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.01, 0.25, 6), hairMat);
                braidStrand.position.set(0.15 * side, 1.66, -0.04);
                braidStrand.rotation.z = -0.15 * side;
                headGroup.add(braidStrand);
            }

            // 3. Signature Ribbon Tie (🎀 Installed to the upper side forehead region)
            const ribbonGroup = new THREE.Group();
            ribbonGroup.position.set(0.14, 1.94, 0.1); // Placement sitting on the top-side front quadrant
            ribbonGroup.rotation.set(0.2, 0.4, -0.3); // Rotated realistically to settle over the braids curve

            // Central Node
            const centerNode = new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 8), ribbonMat);
            ribbonGroup.add(centerNode);

            // Left & Right Bow Loop Wings
            const loopGeo = new THREE.TorusGeometry(0.035, 0.012, 6, 16);
            
            const leftLoop = new THREE.Mesh(loopGeo, ribbonMat);
            leftLoop.position.x = -0.035;
            leftLoop.rotation.y = Math.PI / 6;
            ribbonGroup.add(leftLoop);

            const rightLoop = new THREE.Mesh(loopGeo, ribbonMat);
            rightLoop.position.x = 0.035;
            rightLoop.rotation.y = -Math.PI / 6;
            ribbonGroup.add(rightLoop);

            // Hanging Ribbon Tail Streamers
            const tailGeo = new THREE.CylinderGeometry(0.008, 0.014, 0.09, 4);
            
            const leftTail = new THREE.Mesh(tailGeo, ribbonMat);
            leftTail.position.set(-0.02, -0.045, 0.01);
            leftTail.rotation.z = 0.4;
            ribbonGroup.add(leftTail);

            const rightTail = new THREE.Mesh(tailGeo, ribbonMat);
            rightTail.position.set(0.02, -0.045, 0.01);
            rightTail.rotation.z = -0.4;
            ribbonGroup.add(rightTail);

            headGroup.add(ribbonGroup);
            group.add(headGroup);

            // 4. Fitted Upper Torso & Neck
            const torsoGeo = new THREE.CylinderGeometry(0.13, 0.10, 0.55, 16);
            const torso = new THREE.Mesh(torsoGeo, topMat);
            torso.position.y = 1.35;
            group.add(torso);

            const neckGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.12, 12);
            const neck = new THREE.Mesh(neckGeo, skinMat);
            neck.position.y = 1.64;
            group.add(neck);

            // 5. Fitted Sleeve Arm Subsystems (Pivot Points set up top at shoulders)
            const leftArmRoot = new THREE.Group();
            leftArmRoot.position.set(-0.15, 1.55, 0);
            const leftArmMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.048, 0.04, 0.4, 12), topMat);
            leftArmMesh.position.y = -0.2; // Offset center down so joint pivots clean from top connection link
            leftArmRoot.add(leftArmMesh);

            // Add hands structure
            const leftHand = new THREE.Mesh(new THREE.SphereGeometry(0.038, 12, 12), skinMat);
            leftHand.position.y = -0.42;
            leftArmRoot.add(leftHand);
            group.add(leftArmRoot);

            const rightArmRoot = new THREE.Group();
            rightArmRoot.position.set(0.15, 1.55, 0);
            const rightArmMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.048, 0.04, 0.4, 12), topMat);
            rightArmMesh.position.y = -0.2;
            rightArmRoot.add(rightArmMesh);

            const rightHand = new THREE.Mesh(new THREE.SphereGeometry(0.038, 12, 12), skinMat);
            rightHand.position.y = -0.42;
            rightArmRoot.add(rightHand);
            group.add(rightArmRoot);

            // 6. Signature Extra Baggy Sweatpants
            function buildPuffyLeg() {
                const legGroup = new THREE.Group();
                
                // Puffy thigh balloon segment
                const thigh = new THREE.Mesh(new THREE.SphereGeometry(0.15, 18, 18), pantsMat);
                thigh.scale.set(1.1, 1.4, 1.15); // Adds tracking volume thickness
                thigh.position.y = -0.25;
                legGroup.add(thigh);

                // Lower ankle-pooling track segment
                const shin = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.07, 0.45, 16), pantsMat);
                shin.position.y = -0.65;
                legGroup.add(shin);

                // Crisp White Platform Sneaker
                const kick = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.09, 0.23), shoeMat);
                kick.position.set(0, -0.9, 0.04);
                legGroup.add(kick);

                return legGroup;
            }
            const leftLeg = buildPuffyLeg(); leftLeg.position.set(-0.13, 1.05, 0);
            const rightLeg = buildPuffyLeg(); rightLeg.position.set(0.13, 1.05, 0);
            group.add(leftLeg, rightLeg);

            scene.add(group);

            return {
                root: group,
                head: headGroup,
                leftArm: leftArmRoot,
                rightArm: rightArmRoot,
                leftLeg: leftLeg,
                rightLeg: rightLeg
            };
        }

        // --- REALTIME ANIMATION HANDLERS ---
        function animate() {
            requestAnimationFrame(animate);
            
            const time = clock.getElapsedTime();
            
            // Render frame counter approximation display
            const frameSim = Math.floor(time * FPS) % TOTAL_FRAMES;
            document.getElementById('frame-num').innerText = frameSim;

            // 1. Subtle rhythmic breathing body sways (Natural idles)
            character.root.position.y = Math.sin(time * 2.2) * 0.015;
            character.head.rotation.z = Math.sin(time * 1.1) * 0.03;

            // 2. Continuous Hand Waving Track Animation Sequence
            // Lifting her right shoulder up, pulling it wide, and executing a tight cyclic harmonic wave rotation
            character.rightArm.rotation.z = -Math.PI * 0.70; // Lift arm upward above shoulder levels
            character.rightArm.rotation.x = -Math.PI * 0.1;  // Pull arm slightly forward along the view axis
            
            // The wave translation speed execution calculation
            const waveTrack = Math.sin(time * 7.5) * 0.28; 
            character.rightArm.rotation.y = waveTrack; 

            // Leave passive left arm settling comfortably relaxed down along her side
            character.leftArm.rotation.z = -Math.PI * 0.08 + Math.sin(time * 1.5) * 0.03;

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
