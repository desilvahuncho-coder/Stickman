<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium 3D Vector Emo Rig</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #faba26; /* Matched trend golden-yellow */
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <canvas id="stage"></canvas>

    <script>
        const canvas = document.getElementById('stage');
        const ctx = canvas.getContext('2d');

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resize);
        resize();

        let lastTime = 0;
        let time = 0;

        function animate(timestamp) {
            if (!lastTime) lastTime = timestamp;
            let dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            time += dt;

            // Background
            ctx.fillStyle = '#faba26';
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            const cx = window.innerWidth / 2;
            const cy = window.innerHeight * 0.42; 
            const baseScale = Math.min(window.innerWidth / 375, window.innerHeight / 812) * 1.12;

            // Rhythmic trend dance kinetics
            const sway = Math.sin(time * 3.0) * 6;
            const bounce = Math.abs(Math.sin(time * 3.0)) * 4.5;

            ctx.save();
            ctx.translate(cx + sway, cy + bounce);
            ctx.scale(baseScale, baseScale);

            // COLOR PALETTE
            const skinColor = '#cf987c';
            const topColor = '#423332'; // Deep charcoal/earthy dark emo tone
            const pantsColor = '#c2c2c9';
            const hairColor = '#141416';
            const accessoryColor = '#ff4757'; // Vibrant pink accent

            // --- 1. FLOOR REFLECTION GRAPHIC ---
            ctx.save();
            ctx.translate(0, 252);
            ctx.scale(1, -0.22);
            ctx.globalAlpha = 0.12;
            let floorGlow = ctx.createRadialGradient(0, 0, 10, 0, 0, 95);
            floorGlow.addColorStop(0, 'rgba(0,0,0,0.5)');
            floorGlow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = floorGlow;
            ctx.beginPath(); ctx.ellipse(0, 0, 95, 40, 0, 0, Math.PI * 2); ctx.fill();
            ctx.restore();


            // --- 2. PREMIUM 3D TEARDROP BAGGY PANTS ---
            let pantsGrad = ctx.createLinearGradient(-60, 40, 60, 250);
            pantsGrad.addColorStop(0, '#e1e1e8'); 
            pantsGrad.addColorStop(0.4, '#c2c2c9');
            pantsGrad.addColorStop(1, '#9898a1'); 
            ctx.fillStyle = pantsGrad;
            
            ctx.beginPath();
            ctx.moveTo(-13, 38);
            ctx.bezierCurveTo(-22, 40, -75, 115, -75, 198);
            ctx.bezierCurveTo(-75, 244, -48, 255, -25, 255); 
            ctx.bezierCurveTo(-18, 215, -8, 132, -3, 104); 
            ctx.lineTo(3, 104);
            ctx.bezierCurveTo(8, 132, 18, 215, 25, 255);
            ctx.bezierCurveTo(48, 255, 75, 244, 75, 198);
            ctx.bezierCurveTo(75, 115, 22, 40, 13, 38);
            ctx.closePath();
            ctx.fill();

            // Specular Inner Folds for Realism
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-50, 130); ctx.bezierCurveTo(-62, 180, -55, 210, -40, 235);
            ctx.stroke();

            ctx.strokeStyle = 'rgba(0, 0, 0, 0.09)';
            ctx.lineWidth = 3.5;
            ctx.beginPath();
            ctx.moveTo(-40, 150); ctx.bezierCurveTo(-50, 190, -42, 220, -30, 244);
            ctx.moveTo(40, 150); ctx.bezierCurveTo(50, 190, 42, 220, 30, 244);
            ctx.stroke();

            // White Kicks
            ctx.fillStyle = '#fdfdfd';
            ctx.beginPath(); ctx.arc(-26, 252, 13, 0, Math.PI, false); ctx.fill();
            ctx.beginPath(); ctx.arc(26, 252, 13, 0, Math.PI, false); ctx.fill();


            // --- 3. CONTOURED CROP TOP ---
            let topGrad = ctx.createLinearGradient(-25, -55, 25, 42);
            topGrad.addColorStop(0, '#544140'); 
            topGrad.addColorStop(0.5, '#423332');
            topGrad.addColorStop(1, '#2b201f'); 
            ctx.fillStyle = topGrad;
            ctx.beginPath();
            ctx.moveTo(-25, -55);
            ctx.bezierCurveTo(-12, -54, 12, -54, 26, -55);
            ctx.bezierCurveTo(23, -15, 19, 15, 13, 42); 
            ctx.lineTo(-13, 42);
            ctx.bezierCurveTo(-19, 15, -23, -15, -25, -55);
            ctx.closePath();
            ctx.fill();


            // --- 4. SKIN NECK & SILK DROP SHADOW ---
            ctx.fillStyle = skinColor;
            ctx.fillRect(-7.5, -80, 15, 28);

            let neckShadow = ctx.createLinearGradient(0, -80, 0, -62);
            neckShadow.addColorStop(0, 'rgba(30, 12, 8, 0.5)');
            neckShadow.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = neckShadow;
            ctx.fillRect(-7.5, -80, 15, 18);


            // --- 5. DETAILED EMO ACCESSORIES (LOCKET CHAIN) ---
            ctx.strokeStyle = '#cbd5e1'; // Metallic silver string
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(0, -56, 14, 0, Math.PI, false);
            ctx.stroke();
            // Pendant Locket Piece
            let locketGrad = ctx.createRadialGradient(0, -41, 1, 0, -41, 5);
            locketGrad.addColorStop(0, '#ffffff');
            locketGrad.addColorStop(1, '#94a3b8');
            ctx.fillStyle = locketGrad;
            ctx.beginPath(); ctx.arc(0, -41, 3.5, 0, Math.PI * 2); ctx.fill();


            // --- 6. 3D OVERLAPPING CROSSED ARMS & GLOVES ---
            ctx.save();
            ctx.shadowColor = 'rgba(15, 5, 5, 0.4)';
            ctx.shadowBlur = 7;
            ctx.shadowOffsetY = 4;

            // Left Arm Underlayer
            ctx.fillStyle = '#3a2d2c';
            ctx.save();
            ctx.translate(-23, -53);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-14, 28, -2, 60, 23, 58);
            ctx.bezierCurveTo(23, 45, 12, 41, -2, 33);
            ctx.bezierCurveTo(-5, 23, -3, 10, 0, 0);
            ctx.closePath(); ctx.fill();
            ctx.restore();

            // Right Arm Overlayer
            let rightArmGrad = ctx.createLinearGradient(24, -53, -10, 10);
            rightArmGrad.addColorStop(0, '#544140');
            rightArmGrad.addColorStop(1, '#2b201f');
            ctx.fillStyle = rightArmGrad;
            ctx.save();
            ctx.translate(24, -53);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(14, 27, 4, 64, -25, 62);
            ctx.bezierCurveTo(-36, 60, -30, 35, -13, 33);
            ctx.bezierCurveTo(-3, 27, 2, 11, 0, 0);
            ctx.closePath(); ctx.fill();
            ctx.restore();

            ctx.restore(); // Drop shadow clear

            // Dark Fingerless Emo Gloves Integration
            ctx.fillStyle = '#222225';
            ctx.beginPath();
            ctx.arc(-9, 9, 7, 0, Math.PI * 2); 
            ctx.arc(-2, -6, 8, 0, Math.PI * 2);  
            ctx.fill();
            // Exposed skin fingertips peeking out
            ctx.fillStyle = skinColor;
            ctx.beginPath();
            ctx.arc(-7, 13, 3.5, 0, Math.PI * 2);
            ctx.arc(1, -2, 4, 0, Math.PI * 2);
            ctx.fill();


            // --- 7. REALISTIC OVAL HEAD & GLASSES ---
            let headGrad = ctx.createRadialGradient(0, -114, 8, 0, -114, 42);
            headGrad.addColorStop(0, '#dbab91'); 
            headGrad.addColorStop(1, '#bc876b'); 
            ctx.fillStyle = headGrad;
            ctx.beginPath();
            ctx.ellipse(0, -114, 34.5, 36.5, 0, 0, Math.PI * 2);
            ctx.fill();

            // Clear-Framed Emo Glasses
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.lineWidth = 2.5;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)'; // Glossy lens reflection gloss
            // Left Lens Frame
            ctx.beginPath(); ctx.roundRect(-24, -118, 18, 14, 4); ctx.stroke(); ctx.fill();
            // Right Lens Frame
            ctx.beginPath(); ctx.roundRect(6, -118, 18, 14, 4); ctx.stroke(); ctx.fill();
            // Center Bridge Connector
            ctx.beginPath(); ctx.moveTo(-6, -111); ctx.lineTo(6, -111); ctx.stroke();


            // --- 8. PRECISE HAIRCUT & HIGHLIGHTED CORNROWS ---
            ctx.fillStyle = hairColor;
            ctx.beginPath();
            ctx.ellipse(0, -119, 35.2, 31.5, 0, Math.PI, 0, false);
            ctx.fill();

            // Perfect Scalloped Forehead Baby-Hairs
            ctx.beginPath();
            for (let angle = Math.PI; angle <= Math.PI * 2; angle += 0.11) {
                let hx = Math.cos(angle) * 34.8;
                let hy = -119 + Math.sin(angle) * 30;
                ctx.arc(hx, hy, 3.6, 0, Math.PI * 2);
            }
            ctx.fill();

            // Dimensional Braid Specular Track Highlights
            const tracks = 9;
            for (let i = 0; i < tracks; i++) {
                ctx.lineWidth = 2.0;
                ctx.strokeStyle = '#2d2d35'; // Soft alternate reflection track tint
                ctx.beginPath();
                let spacing = (i / (tracks - 1)) - 0.5;
                ctx.ellipse(spacing * 16, -123, 26, 26, 0, Math.PI * 1.1, Math.PI * 1.9);
                ctx.stroke();
            }

            // Hanging side locks extensions
            ctx.fillStyle = hairColor;
            ctx.fillRect(-34.5, -104, 4.5, 32);
            ctx.fillRect(30, -104, 4.5, 32);


            // --- 9. ICONIC SIDE FOREHEAD PINK RIBBON BOW ---
            ctx.save();
            ctx.translate(-24, -139);
            ctx.rotate(-0.1);
            
            // Subtle depth drop-shadow for the bow layers
            ctx.shadowColor = 'rgba(0, 0, 0, 0.15)';
            ctx.shadowBlur = 3;

            let pinkGrad = ctx.createLinearGradient(-10, -5, 10, 5);
            pinkGrad.addColorStop(0, '#ff6b81');
            pinkGrad.addColorStop(1, '#ff4757');
            ctx.fillStyle = pinkGrad;

            // Loops
            ctx.beginPath(); ctx.ellipse(-11, -3, 12, 7.5, -Math.PI / 6, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(12, -3, 13, 7.5, Math.PI / 6, 0, Math.PI * 2); ctx.fill();

            // Streamer Tails
            ctx.fillStyle = '#ff4757';
            ctx.beginPath(); ctx.moveTo(-4, 1); ctx.lineTo(-10, 16); ctx.lineTo(-3, 14); ctx.lineTo(-1, 1); ctx.closePath(); ctx.fill();
            ctx.beginPath(); ctx.moveTo(1, 1); ctx.lineTo(3, 14); ctx.lineTo(10, 16); ctx.lineTo(4, 1); ctx.closePath(); ctx.fill();

            // Center Node Knot
            ctx.fillStyle = '#ff6b81';
            ctx.beginPath(); ctx.arc(0, 0, 4.5, 0, Math.PI * 2); ctx.fill();
            ctx.restore();

            ctx.restore();
            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
    </script>
</body>
</html>
